<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | ARKENSTYLE</title>
    <link rel="icon" href="/src/assets/img/ak-removebg-preview.png">
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-gradient-to-r from-stone-500 to-stone-700 border-gray-200">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

        <a href="/index.html" class="flex items-center space-x-3">
            <img src="/img/jacket.png" class="h-8" alt="Logo">
            <span class="text-2xl font-bold text-white">ARKENSTYLE</span>
        </a>

        <div class="items-center justify-between w-full md:flex md:w-auto">
            <ul class="flex flex-col md:flex-row md:space-x-8 font-medium mt-4 md:mt-0">

                <li>
                    <a href="/index.html" class="text-white hover:text-blue-300">
                        Home
                    </a>
                </li>

                <li>
                    <a href="/src/pages/Galeria.html" class="text-white hover:text-blue-300">
                        Galería
                    </a>
                </li>

                <li>
                    <a href="/src/pages/Servicios.html" class="text-white hover:text-blue-300">
                        Servicios
                    </a>
                </li>

                <li>
                    <a href="/src/pages/Contacto.html" class="text-blue-300 font-semibold">
                        Contacto
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- FORMULARIO -->

<section class="py-16">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-xl p-10">

        <h1 class="text-4xl font-bold text-center text-gray-800">
            Formulario de Registro
        </h1>

        <p class="text-center text-gray-500 mt-3 mb-10">
            Completa tus datos para registrarte en ARKENSTYLE.
        </p>

        <form class="grid md:grid-cols-2 gap-6">

            <div>
                <label class="font-semibold">Nombre</label>
                <input
                    type="text"
                    class="w-full border rounded-lg p-3 mt-2 focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="font-semibold">Apellido</label>
                <input
                    type="text"
                    class="w-full border rounded-lg p-3 mt-2 focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="font-semibold">Correo electrónico</label>
                <input
                    type="email"
                    class="w-full border rounded-lg p-3 mt-2 focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="font-semibold">Teléfono</label>
                <input
                    type="tel"
                    class="w-full border rounded-lg p-3 mt-2 focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="md:col-span-2">
                <label class="font-semibold">Fecha de nacimiento</label>
                <input
                    type="date"
                    class="w-full border rounded-lg p-3 mt-2 focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="md:col-span-2">
                <label class="font-semibold">Comentarios</label>
                <textarea
                    rows="5"
                    class="w-full border rounded-lg p-3 mt-2 focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div class="md:col-span-2">
                <label class="font-semibold">Sube tu fotografía</label>
                <input
                    type="file"
                    class="w-full mt-2">
            </div>

            <div class="md:col-span-2">
                <label class="font-semibold">Género</label>

                <div class="flex gap-6 mt-3">
                    <label>
                        <input type="radio" name="genero">
                        Masculino
                    </label>

                    <label>
                        <input type="radio" name="genero">
                        Femenino
                    </label>

                    <label>
                        <input type="radio" name="genero">
                        Otro
                    </label>
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="flex items-center gap-2">
                    <input type="checkbox">
                    Acepto los términos y condiciones
                </label>
            </div>

            <div class="md:col-span-2 flex justify-center gap-4 mt-6">

                <button
                    type="button"
                    onclick="alert('¡Perderás todo tu registro!')"
                    class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg">
                    Cancelar
                </button>

                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg">
                    Registrarse
                </button>

                <button
                    type="reset"
                    class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-lg">
                    Limpiar
                </button>

            </div>

        </form>

    </div>
</section>

<script type="module" src="/src/js/main.js"></script>

</body>
</html>
